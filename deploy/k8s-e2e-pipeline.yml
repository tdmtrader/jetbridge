# K8s E2E Pipeline — KinD-based integration and behavioral tests
#
# These tests create ephemeral KinD clusters inside the task pod,
# deploy Concourse via Helm, and run the full topgun test suites.
# Requires privileged tasks for Docker-in-Docker.

resources:
- name: trigger
  type: time
  source:
    interval: 24h

jobs:
- name: build-kind-runner
  serial: true
  plan:
  - get: trigger
    trigger: true
  - task: build-kind-runner-image
    privileged: true
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v4
      run:
        path: sh
        args:
        - -exc
        - |
          REGISTRY="registry-docker-registry.cicd.svc.cluster.local:5000"
          IMAGE="${REGISTRY}/concourse-kind-runner:v29"
          BUILDER_POD="kind-runner-builder-$$"

          cleanup_builder() { kubectl delete pod -n cicd ${BUILDER_POD} --grace-period=0 --force 2>/dev/null || true; }
          trap cleanup_builder EXIT
          kubectl delete pod -n cicd -l app=kind-runner-builder --grace-period=0 --force 2>/dev/null || true

          echo "=== Creating DinD builder pod ==="
          cat <<PODEOF | kubectl apply -n cicd -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: ${BUILDER_POD}
            namespace: cicd
            labels:
              app: kind-runner-builder
          spec:
            containers:
            - name: dind
              image: docker:dind
              securityContext:
                privileged: true
              env:
              - name: DOCKER_TLS_CERTDIR
                value: ""
              command: ["dockerd", "--host=unix:///var/run/docker.sock", "--insecure-registry=${REGISTRY}"]
              resources:
                requests:
                  memory: "4Gi"
                  cpu: "2"
          PODEOF

          echo "Waiting for builder pod..."
          kubectl wait --for=condition=ready pod/${BUILDER_POD} -n cicd --timeout=180s

          echo "Waiting for Docker daemon..."
          for i in $(seq 1 30); do
            if kubectl exec -n cicd ${BUILDER_POD} -- docker info >/dev/null 2>&1; then
              echo "Docker daemon ready"
              break
            fi
            sleep 2
          done

          echo "=== Downloading helm binary (get.helm.sh reachable from task pod) ==="
          curl --retry 3 -fsSL https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz \
            | tar xz --strip-components=1 -C /tmp linux-amd64/helm

          echo "=== Cloning fresh source ==="
          git clone --depth 1 --branch jetbridge https://github.com/tdmtrader/jetbridge.git /tmp/fresh-src

          echo "=== Copying source + Dockerfile + helm to builder ==="
          kubectl exec -n cicd ${BUILDER_POD} -- mkdir -p /build
          cd /tmp/fresh-src
          cp /tmp/helm ./helm
          cp deploy/Dockerfile.kind-runner Dockerfile
          tar cf - --exclude=.git . | kubectl exec -i -n cicd ${BUILDER_POD} -- sh -c 'tar xf - -C /build'

          echo "=== Building kind-runner image (no cache) ==="
          kubectl exec -n cicd ${BUILDER_POD} -- docker build --no-cache -t ${IMAGE} -f /build/Dockerfile /build

          echo "=== Pushing to registry (with retry) ==="
          for attempt in 1 2 3 4 5; do
            if kubectl exec -n cicd ${BUILDER_POD} -- docker push ${IMAGE}; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            echo "Push failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
            if [ "$attempt" -eq 5 ]; then
              echo "All push attempts failed"
              exit 1
            fi
          done

          echo "=== kind-runner image built and pushed ==="

- name: k8s-integration-tests
  serial: true
  serial_groups: [k8s-tests]
  plan:
  - get: trigger
    trigger: true
    passed: [build-kind-runner]
  - task: k8s-integration
    privileged: true
    timeout: 45m
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-kind-runner:v29
      run:
        path: sh
        args:
        - -exc
        - |
          cd /src

          # Initialize a git repo so tests can find the repo root via git rev-parse.
          # The kind-runner image has source at /src but it's not a git clone.
          git init -q && git add -A && git -c user.name=ci -c user.email=ci@test commit -q -m "init" --allow-empty

          echo "=== Pre-compiling everything before Docker (avoids CPU contention with containerd) ==="
          GOOS=linux GOARCH=amd64 go build -o concourse-linux-amd64 ./cmd/concourse
          GOOS=linux GOARCH=amd64 go build -o artifact-daemon-linux-amd64 ./cmd/artifact-daemon
          go build -o /tmp/fly ./fly
          go test -c -o /tmp/integration.test ./topgun/k8s/integration/
          go mod download

          echo "=== Starting Docker daemon (DinD) ==="
          # Thorough cleanup of stale Docker/containerd state from previous runs.
          killall -9 dockerd containerd 2>/dev/null || true
          sleep 1
          rm -rf /var/run/docker.pid /var/run/docker /var/run/containerd /run/containerd 2>/dev/null || true
          mkdir -p /var/lib/docker /run/containerd
          mount -t tmpfs -o size=8G tmpfs /var/lib/docker 2>/dev/null || true
          # --dns=8.8.8.8 ensures nested containers (K3s) can resolve
          # external hostnames for pulling system images (CoreDNS, etc.)
          /usr/local/bin/dockerd --host=unix:///var/run/docker.sock \
                  --dns=8.8.8.8 \
                  --log-level=warn &
          DOCKERD_PID=$!

          echo "Waiting for Docker daemon..."
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon ready"
              docker info | grep "Storage Driver"
              break
            fi
            sleep 2
          done

          echo "=== Building concourse Docker image ==="
          # Stage only the needed binaries to avoid sending the full repo (~315MB)
          # as Docker build context — that causes OOM/eviction in constrained pods.
          mkdir -p /tmp/docker-build
          cp concourse-linux-amd64 artifact-daemon-linux-amd64 /tmp/docker-build/
          cat <<'DOCKERFILE' > /tmp/docker-build/Dockerfile
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates dumb-init && rm -rf /var/lib/apt/lists/*
          COPY concourse-linux-amd64 /usr/local/concourse/bin/concourse
          COPY artifact-daemon-linux-amd64 /usr/local/concourse/bin/artifact-daemon
          RUN chmod +x /usr/local/concourse/bin/concourse /usr/local/concourse/bin/artifact-daemon
          ENV PATH="/usr/local/concourse/bin:${PATH}"
          ENTRYPOINT ["dumb-init", "concourse"]
          DOCKERFILE
          docker build -t concourse-local:latest /tmp/docker-build/
          echo "=== Image built ==="

          echo "=== Pre-pulling K3s image (after Docker build to avoid layer corruption from shim disconnects) ==="
          docker pull rancher/k3s:v1.31.6-k3s1

          echo "=== Running K8s integration tests (pre-compiled, KinD cluster) ==="
          FLY_PATH=/tmp/fly /tmp/integration.test -test.v -test.timeout 30m -test.count 1 || {
            echo "=== TEST FAILED — dumping diagnostics ==="
            echo "--- Docker containers ---"
            docker ps -a 2>/dev/null || true
            echo "--- kubeadm.conf from KinD node ---"
            docker cp concourse-integration-control-plane:/kind/kubeadm.conf /tmp/kubeadm-debug.conf 2>&1 && cat /tmp/kubeadm-debug.conf || echo "(container not available)"
            echo "--- End diagnostics ---"
            kill $DOCKERD_PID 2>/dev/null || true
            exit 1
          }
          echo "=== K8s integration tests passed ==="

          kill $DOCKERD_PID 2>/dev/null || true

- name: k8s-behavioral-tests
  serial: true
  plan:
  - get: trigger
    trigger: true
    passed: [k8s-integration-tests]
  - task: k8s-behavioral
    privileged: true
    timeout: 4h
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-kind-runner:v29
      run:
        path: sh
        args:
        - -exc
        - |
          cd /src

          # Initialize a git repo so tests can find the repo root via git rev-parse.
          git init -q && git add -A && git -c user.name=ci -c user.email=ci@test commit -q -m "init" --allow-empty

          echo "=== Pre-compiling everything before Docker (avoids CPU contention with containerd) ==="
          GOOS=linux GOARCH=amd64 go build -o concourse-linux-amd64 ./cmd/concourse
          GOOS=linux GOARCH=amd64 go build -o artifact-daemon-linux-amd64 ./cmd/artifact-daemon
          go build -o /tmp/fly ./fly
          go test -c -o /tmp/behavioral.test ./topgun/k8s_behavioral/

          echo "=== Starting Docker daemon (DinD) ==="
          # Thorough cleanup of stale Docker/containerd state from previous runs.
          killall -9 dockerd containerd 2>/dev/null || true
          sleep 1
          rm -rf /var/run/docker.pid /var/run/docker /var/run/containerd /run/containerd 2>/dev/null || true
          mkdir -p /var/lib/docker /run/containerd
          mount -t tmpfs -o size=8G tmpfs /var/lib/docker 2>/dev/null || true
          # --dns=8.8.8.8 ensures nested containers (K3s) can resolve
          # external hostnames for pulling system images (CoreDNS, etc.)
          /usr/local/bin/dockerd --host=unix:///var/run/docker.sock \
                  --dns=8.8.8.8 \
                  --log-level=warn &
          DOCKERD_PID=$!

          echo "Waiting for Docker daemon..."
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon ready"
              docker info | grep "Storage Driver"
              break
            fi
            sleep 2
          done

          echo "=== Building concourse Docker image ==="
          # Stage only the needed binaries to avoid sending the full repo (~315MB)
          # as Docker build context — that causes OOM/eviction in constrained pods.
          mkdir -p /tmp/docker-build
          cp concourse-linux-amd64 artifact-daemon-linux-amd64 /tmp/docker-build/
          cat <<'DOCKERFILE' > /tmp/docker-build/Dockerfile
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates dumb-init && rm -rf /var/lib/apt/lists/*
          COPY concourse-linux-amd64 /usr/local/concourse/bin/concourse
          COPY artifact-daemon-linux-amd64 /usr/local/concourse/bin/artifact-daemon
          RUN chmod +x /usr/local/concourse/bin/concourse /usr/local/concourse/bin/artifact-daemon
          ENV PATH="/usr/local/concourse/bin:${PATH}"
          ENTRYPOINT ["dumb-init", "concourse"]
          DOCKERFILE
          docker build -t concourse-local:latest /tmp/docker-build/
          echo "=== Image built ==="

          echo "=== Building oom-trigger image ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/oom-trigger ./cmd/oom-trigger
          printf 'FROM scratch\nCOPY oom-trigger /oom-trigger\nENTRYPOINT ["/oom-trigger"]\n' > /tmp/Dockerfile.oom
          docker build -f /tmp/Dockerfile.oom -t oom-trigger:latest /tmp/
          echo "=== oom-trigger image built ==="

          echo "=== Pre-pulling K3s image (after Docker builds to avoid layer corruption from shim disconnects) ==="
          docker pull rancher/k3s:v1.31.6-k3s1

          echo ""
          echo "=== Running K8s behavioral tests (pre-compiled, 2 parallel KinD clusters) ==="
          echo "This will take 2-3 hours."
          echo ""
          # Run with 1 process — concurrent K3s cluster creation overwhelms
          # Docker's containerd with image layer lock contention in DinD.
          # Single-process mode is slower but reliable.
          FLY_PATH=/tmp/fly ginkgo --procs=${K8S_PROCS:-1} -v --timeout=4h /tmp/behavioral.test
          echo "=== K8s behavioral tests passed ==="

          kill $DOCKERD_PID 2>/dev/null || true
