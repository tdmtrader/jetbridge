## CI Agent Validation Pipeline
## Tests that the unified ci-agent binary builds and produces structurally valid output
## for each phase (review, fix, plan, qa, implement).
## This pipeline runs independently — agent failures do NOT block deploys.

resources:
- name: repo
  type: git
  source:
    uri: https://github.com/tdmtrader/jetbridge.git
    branch: jetbridge
    username: x-access-token
    password: ((github-pat))
  check_every: 30s

jobs:
- name: build-agent
  plan:
  - get: repo
    trigger: true
    params: {depth: 25}
  - task: compile-ci-agent
    config:
      platform: linux
      rootfs_uri: docker:///golang:1.25-bookworm
      inputs:
      - name: repo
      caches:
      - path: gopath/pkg/mod
      - path: gocache
      run:
        path: sh
        args:
        - -exc
        - |
          export GOPATH="$(pwd)/gopath"
          export GOCACHE="$(pwd)/gocache"
          cd repo/ci-agent

          echo "=== Building unified ci-agent binary ==="
          go build -o /tmp/ci-agent ./cmd/ci-agent/

          echo "  Building validate-output..."
          go build -o /tmp/validate-output ./cmd/validate-output/

          echo ""
          echo "=== Binaries compiled successfully ==="
          ls -lh /tmp/ci-agent /tmp/validate-output

- name: test-agent-review
  plan:
  - get: repo
    trigger: true
    passed: [build-agent]
    params: {depth: 25}
  - task: run-agent-review
    config:
      platform: linux
      rootfs_uri: docker:///golang:1.25-bookworm
      inputs:
      - name: repo
      outputs:
      - name: review
      caches:
      - path: gopath/pkg/mod
      - path: gocache
      params:
        ANTHROPIC_API_KEY: ((anthropic-api-key))
        AGENT_CLI: claude
        AGENT_MODEL: ((agent-model))
        SCORE_THRESHOLD: "7.0"
        FAIL_ON_CRITICAL: "false"
        REVIEW_DIFF_ONLY: "true"
        BASE_REF: "main"
      run:
        path: sh
        args:
        - -exc
        - |
          export GOPATH="$(pwd)/gopath"
          export GOCACHE="$(pwd)/gocache"

          echo "=== Installing Node.js and Claude CLI ==="
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y --no-install-recommends nodejs
          npm install -g @anthropic-ai/claude-code
          claude --version

          echo "=== Building ci-agent + validate-output ==="
          cd repo/ci-agent
          go build -o /usr/local/bin/ci-agent ./cmd/ci-agent/
          go build -o /usr/local/bin/validate-output ./cmd/validate-output/
          PHASES_DIR="$(pwd)/phases"
          cd ../..

          export REPO_DIR="$(pwd)/repo"
          export OUTPUT_DIR="$(pwd)/review"

          echo "=== Running ci-agent review phase ==="
          ci-agent --phase "${PHASES_DIR}/review.yaml" || true

          echo "=== Validating review output ==="
          if [ -f review/review.json ]; then
            echo "review.json contents:"
            cat review/review.json | head -50
            echo ""
            validate-output --output-dir "$(pwd)/review" --type review
          else
            echo "WARN: review.json not produced (agent may have failed)"
            echo "Checking for any output files..."
            ls -la review/ 2>/dev/null || echo "  (empty)"
          fi

- name: test-agent-qa
  plan:
  - get: repo
    trigger: true
    passed: [build-agent]
    params: {depth: 25}
  - task: run-agent-qa
