{{- if .Values.rbac.create }}
---
# ClusterRole for cluster-scoped resources (nodes, secrets).
# The web SA needs node/get to resolve node names to IPs for artifact
# daemon communication (RegisterResourceCache, RecordOutputs).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "concourse.fullname" . }}-web
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
rules:
  # Read pipeline credential secrets from the cluster. Limited to get
  # (no list/watch) to prevent enumerating all secrets in the cluster.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Resolve node names to IPs for artifact daemon communication
  # (DaemonClient uses node IP to reach the local daemon pod).
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "concourse.fullname" . }}-web
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "concourse.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "concourse.fullname" . }}-web
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "concourse.fullname" . }}-pod-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
rules:
  # Task and check pod lifecycle management.
  # Concourse creates pods with label concourse.ci/* — future RBAC tightening
  # can use resourceNames or admission webhooks to restrict to labeled pods only.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Read-only PVC access for cache and artifact volume discovery.
  # No create/delete — PVCs are pre-provisioned by operators or hostPath-backed.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  # Worker registrar updates the web deployment's annotations to
  # record worker state and heartbeat timestamps.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # EndpointSlice discovery for artifact daemon peer resolution.
  # DaemonClient uses this to find daemon pod IPs for cross-node
  # artifact streaming and resource cache probing. Read-only.
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "concourse.fullname" . }}-pod-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "concourse.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "concourse.fullname" . }}-pod-manager
  apiGroup: rbac.authorization.k8s.io
{{- end }}
