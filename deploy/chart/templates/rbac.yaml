{{- if .Values.rbac.create }}
---
# ClusterRole for cluster-scoped resources (nodes, secrets).
# The web SA needs node/get to resolve node names to IPs for artifact
# daemon communication (RegisterResourceCache, RecordOutputs).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "concourse.fullname" . }}-web
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "concourse.fullname" . }}-web
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "concourse.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "concourse.fullname" . }}-web
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "concourse.fullname" . }}-pod-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
rules:
  # Task and check pod lifecycle management.
  # Concourse creates pods with label concourse.ci/* — future RBAC tightening
  # can use resourceNames or admission webhooks to restrict to labeled pods only.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # PVC access for cache and artifact volumes
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  # Deployment self-update (used by registrar for worker state)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # EndpointSlice discovery for artifact daemon peer resolution
  # (used by DaemonClient to discover daemon pod IPs for StreamIn
  # and resource cache probing)
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "concourse.fullname" . }}-pod-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "concourse.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "concourse.fullname" . }}-pod-manager
  apiGroup: rbac.authorization.k8s.io
{{- end }}
