{{- if .Values.artifactDaemon.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "concourse.fullname" . }}-artifact-daemon
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: artifact-daemon
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "concourse.fullname" . }}-artifact-daemon
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: artifact-daemon
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "concourse.fullname" . }}-artifact-daemon
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: artifact-daemon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "concourse.fullname" . }}-artifact-daemon
subjects:
  - kind: ServiceAccount
    name: {{ include "concourse.fullname" . }}-artifact-daemon
    namespace: {{ .Release.Namespace }}
{{- end }}
