{{- if .Values.artifactDaemon.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "concourse.fullname" . }}-artifact-daemon
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: artifact-daemon
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "concourse.fullname" . }}-artifact-daemon
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: artifact-daemon
rules:
  # Get node info for self-identification; patch to annotate the node
  # with the daemon's readiness status (concourse.dev/artifact-cache label).
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
  # Discover other daemon pods for cross-node artifact routing.
  # Read-only — daemons never modify endpoint data.
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "concourse.fullname" . }}-artifact-daemon
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: artifact-daemon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "concourse.fullname" . }}-artifact-daemon
subjects:
  - kind: ServiceAccount
    name: {{ include "concourse.fullname" . }}-artifact-daemon
    namespace: {{ .Release.Namespace }}
{{- end }}
