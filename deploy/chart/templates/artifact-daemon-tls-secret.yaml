{{- if and .Values.artifactDaemon.enabled .Values.artifactDaemon.tls.enabled (not .Values.artifactDaemon.tls.existingSecret) }}
{{- $fullName := include "concourse.fullname" . }}
{{- $secretName := printf "%s-artifact-daemon-tls" $fullName }}
{{- $namespace := .Release.Namespace }}
{{- $serviceName := include "concourse.artifactDaemonServiceName" . }}
{{/*
  Persist the CA across helm upgrades by looking up the existing secret.
  If it doesn't exist yet, generate a fresh CA.
*/}}
{{- $existingSecret := (lookup "v1" "Secret" $namespace $secretName) }}
{{- $ca := "" }}
{{- if and $existingSecret $existingSecret.data }}
  {{- $ca = buildCustomCert (index $existingSecret.data "ca.crt") (index $existingSecret.data "ca.key") }}
{{- else }}
  {{- $ca = genCA "concourse-artifact-daemon-ca" 3650 }}
{{- end }}
{{- $serverAltNames := list
      (printf "%s.%s.svc" $serviceName $namespace)
      (printf "*.%s.%s.svc" $serviceName $namespace)
      (printf "%s.%s.svc.cluster.local" $serviceName $namespace)
      "localhost"
}}
{{- $serverCert := genSignedCert "artifact-daemon" (list "127.0.0.1") $serverAltNames 3650 $ca }}
{{- $clientCert := genSignedCert "concourse-client" nil nil 3650 $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: artifact-daemon
type: Opaque
data:
  ca.crt: {{ $ca.Cert | b64enc }}
  ca.key: {{ $ca.Key | b64enc }}
  tls.crt: {{ $serverCert.Cert | b64enc }}
  tls.key: {{ $serverCert.Key | b64enc }}
  client.crt: {{ $clientCert.Cert | b64enc }}
  client.key: {{ $clientCert.Key | b64enc }}
{{- end }}
