{{- if .Values.artifactDaemon.enabled }}
{{- $tlsEnabled := .Values.artifactDaemon.tls.enabled | default false }}
{{- $tlsSecretName := .Values.artifactDaemon.tls.existingSecret | default (printf "%s-artifact-daemon-tls" (include "concourse.fullname" .)) }}
{{- /*
   Resolve mirror.replicas: numbers pass through (including the explicit
   value 0 = disabled); the literal "all" maps to -1 (the daemon's flag
   value for "every live peer"). Anything else is a misconfiguration and
   we let Helm fail loudly.

   Note: we read the value directly rather than using `default` because
   `default` treats Go's zero-value (int 0) as "unset" and would silently
   override an operator's intentional `replicas: 0` with the chart default.
*/ -}}
{{- $mirrorReplicasRaw := .Values.artifactDaemon.mirror.replicas }}
{{- if eq $mirrorReplicasRaw nil }}
  {{- $mirrorReplicasRaw = 2 }}
{{- end }}
{{- $mirrorReplicas := $mirrorReplicasRaw }}
{{- if kindIs "string" $mirrorReplicasRaw }}
  {{- if eq $mirrorReplicasRaw "all" }}
    {{- $mirrorReplicas = -1 }}
  {{- else }}
    {{- fail (printf "artifactDaemon.mirror.replicas must be an integer or the string \"all\", got %q" $mirrorReplicasRaw) }}
  {{- end }}
{{- end }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "concourse.fullname" . }}-artifact-daemon
  labels:
    {{- include "concourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: artifact-daemon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "concourse.name" . }}
      app.kubernetes.io/component: artifact-daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "concourse.name" . }}
        app.kubernetes.io/component: artifact-daemon
    spec:
      serviceAccountName: {{ include "concourse.fullname" . }}-artifact-daemon
      subdomain: {{ include "concourse.artifactDaemonServiceName" . }}
      terminationGracePeriodSeconds: 30
      # NOTE: Daemon runs as root — it manages a shared hostPath volume where task
      # containers (running as arbitrary UIDs) write artifacts with varying permissions.
      # K8s does not apply fsGroup to hostPath, so non-root cannot reliably read/clean
      # task-created files. CAP_DAC_OVERRIDE is the sole capability added back (out of
      # ~40) to bypass permission checks on those files. Everything else is dropped.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: artifact-daemon
          image: {{ include "concourse.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/concourse/bin/artifact-daemon
            - --port={{ .Values.artifactDaemon.port | default 7780 }}
            - --storage-path={{ .Values.artifactDaemon.hostPath | default "/var/concourse/artifacts" }}
            - --ttl={{ .Values.artifactDaemon.ttl | default "2h" }}
            - --node-name=$(NODE_NAME)
            - --namespace={{ include "concourse.kubernetesNamespace" . }}
            - --service-name={{ include "concourse.artifactDaemonServiceName" . }}
            - --label-key=concourse.dev/artifact-cache
            {{- if $tlsEnabled }}
            - --tls-cert=/etc/concourse/daemon-tls/tls.crt
            - --tls-key=/etc/concourse/daemon-tls/tls.key
            - --tls-ca-cert=/etc/concourse/daemon-tls/ca.crt
            {{- end }}
            - --mirror-replicas={{ $mirrorReplicas }}
            - --mirror-concurrency={{ .Values.artifactDaemon.mirror.concurrency | default 4 }}
            - --mirror-timeout={{ .Values.artifactDaemon.mirror.timeout | default "5m" }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: http
              containerPort: {{ .Values.artifactDaemon.port | default 7780 }}
              hostPort: {{ .Values.artifactDaemon.port | default 7780 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              {{- if $tlsEnabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              {{- if $tlsEnabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - DAC_OVERRIDE
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.artifactDaemon.resources | nindent 12 }}
          volumeMounts:
            - name: artifact-storage
              mountPath: {{ .Values.artifactDaemon.hostPath | default "/var/concourse/artifacts" }}
            {{- if $tlsEnabled }}
            - name: daemon-tls
              mountPath: /etc/concourse/daemon-tls
              readOnly: true
            {{- end }}
      volumes:
        - name: artifact-storage
          hostPath:
            path: {{ .Values.artifactDaemon.hostPath | default "/var/concourse/artifacts" }}
            type: DirectoryOrCreate
        {{- if $tlsEnabled }}
        - name: daemon-tls
          secret:
            secretName: {{ $tlsSecretName }}
        {{- end }}
      {{- with .Values.artifactDaemon.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.artifactDaemon.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.artifactDaemon.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
