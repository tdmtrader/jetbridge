## Concourse JetBridge Helm Chart — values.yaml
## All configurable parameters for deploying Concourse with the K8s-native runtime.

# -- Container image configuration
image:
  # -- Docker image repository
  repository: concourse-local
  # -- Image tag (defaults to appVersion from Chart.yaml)
  tag: ""
  # -- Image pull policy. Use "Never" for locally built images on k3s/kind.
  pullPolicy: IfNotPresent
  # -- Image pull secrets for private registries
  pullSecrets: []

# -- Concourse web node configuration
web:
  # -- Number of web node replicas
  replicas: 1

  # -- Concourse external URL (how users reach the UI)
  externalUrl: http://localhost:8080

  # -- Cluster name displayed in the UI
  clusterName: jetbridge

  # -- Log level: debug, info, error
  logLevel: info

  # -- Local user credentials (user:password pairs)
  localUsers: "test:test"

  # -- Main team local user (granted admin on the main team)
  mainTeamLocalUser: test

  # -- Pod-level security context (applied to the pod spec)
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534

  # -- Container-level security context for the web container
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  # -- API connection pool max connections (per replica).
  # For N replicas, ensure PostgreSQL max_connections >= N * (apiMaxConns + backendMaxConns + 7).
  apiMaxConns: 10

  # -- Backend connection pool max connections (per replica).
  # Backend pool is used by scheduler, build tracker, and other internal components.
  backendMaxConns: 50

  # -- Startup probe configuration. Allows extra time for DB migration on first boot.
  startupProbe:
    httpGet:
      path: /api/v1/info
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

  # -- Termination grace period (seconds). Set high enough for in-flight builds to drain.
  terminationGracePeriodSeconds: 120

  # -- Resource requests and limits for the web pod
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

  # -- TLS configuration for native HTTPS on the web container.
  # When enabled, the web binary serves HTTPS via --tls-bind-port, --tls-cert, --tls-key.
  tls:
    # -- Enable TLS on the web container
    enabled: false
    # -- HTTPS listen port inside the container
    bindPort: 443
    # -- Name of the Kubernetes Secret containing TLS cert and key
    secretName: concourse-web-tls
    # -- Mount path for the TLS secret inside the container
    mountPath: /concourse-tls
    # -- Key in the Secret for the TLS certificate
    certFilename: tls.crt
    # -- Key in the Secret for the TLS private key
    keyFilename: tls.key

  # -- Additional environment variables for the web container.
  # Supports both literal values and valueFrom (secretKeyRef, configMapKeyRef):
  #   - name: CONCOURSE_GITHUB_CLIENT_ID
  #     value: "my-client-id"
  #   - name: CONCOURSE_GITHUB_CLIENT_SECRET
  #     valueFrom:
  #       secretKeyRef:
  #         name: github-oauth
  #         key: client-secret
  env: []

  # -- Additional CLI args for the web command
  extraArgs: []

  # -- Extra volume mounts for the web container (e.g. custom CA bundles, credential files)
  extraVolumeMounts: []
  # -- Extra volumes for the web pod
  extraVolumes: []

  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /api/v1/info
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 5

  # -- Readiness probe configuration.
  # Uses /api/v1/health which checks DB connectivity and worker availability.
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

  # -- Node selector for the web pod
  nodeSelector: {}
  # -- Tolerations for the web pod
  tolerations: []
  # -- Affinity rules for the web pod
  affinity: {}

# -- Kubernetes runtime (JetBridge) configuration
kubernetes:
  # -- Namespace where task/check pods are created.
  # Defaults to the release namespace.
  namespace: ""

  # -- ServiceAccount for task pods (uses web SA if empty)
  serviceAccount: ""

  # -- Pod startup timeout
  podStartupTimeout: 5m

  # -- Image pull secrets for task pods.
  # In JetBridge's K8s-native runtime, these secrets are attached directly to
  # task pods, replacing the need for custom registry-image resources that
  # handled GCR/ECR/ACR authentication in the Garden runtime.
  # Example:
  #   imagePullSecrets:
  #     - name: gcr-json-key       # GCR: kubectl create secret docker-registry gcr-json-key ...
  #     - name: ecr-cred-secret    # ECR: managed by ecr-credential-helper or external-secrets
  imagePullSecrets: []

  # -- Artifact helper image (needs tar; used by init containers and sidecar)
  artifactHelperImage: "alpine:latest"

  # -- Image registry prefix for custom resource type images.
  # Applied as a prefix to resource type image references, e.g. "myregistry.io/"
  # combined with imagePullSecrets enables pulling custom resource type images
  # from private registries without a custom registry-image resource type.
  imageRegistryPrefix: ""
  # -- Image registry pull secret name for resource type image pulls.
  # When set, this secret is added to pods that pull resource type images.
  imageRegistrySecret: ""

# -- Explicit task cache backend selector.
# Valid values: artifact, pvc, hostpath, emptydir.
# When empty (default), auto-detects based on which config is set:
#   artifact store > cache PVC > hostpath > emptydir.
# Set explicitly to override auto-detection (e.g. "hostpath" when you
# prefer node-local caches even though the artifact store is configured).
cacheStore: ""

# -- Cache PVC configuration (speeds up resource gets and task caches)
# When enabled, takes precedence over cacheHostPath.
cachePvc:
  # -- Enable the cache PVC
  enabled: true
  # -- PVC name
  name: concourse-cache
  # -- Storage size
  size: 5Gi
  # -- Storage class (empty = cluster default)
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce

# -- Host path for node-local task cache persistence.
# Used when cachePvc is disabled. Caches survive pod restarts on the same node.
# Set to "" to disable (falls back to ephemeral emptyDir).
cacheHostPath: ""

# -- Artifact store PVC (cross-pod volume passing via init containers)
artifactStorePvc:
  # -- Enable the artifact store PVC
  enabled: true
  # -- PVC name
  name: concourse-artifacts
  # -- Storage size (nominal for GCS Fuse; actual for block storage)
  size: 10Gi
  # -- Storage class (empty = cluster default)
  storageClass: ""
  # -- Access modes.
  # WARNING: ReadWriteOnce (default) only allows ONE pod to mount at a time.
  # For multi-replica web deployments or concurrent builds, use ReadWriteMany (RWX).
  # Options:
  #   - ReadWriteOnce: Single-replica only. Concurrent builds will queue.
  #   - ReadWriteMany: Requires NFS, EFS, or similar RWX-capable storage class.
  #   - GCS Fuse (GKE): Enable gcsFuse below for GCS-backed RWX storage.
  accessModes:
    - ReadWriteOnce

  # -- GCS Fuse CSI driver configuration (GKE only).
  # When enabled, the chart creates a PV + PVC backed by a GCS bucket
  # using the gcsfuse.csi.storage.gke.io CSI driver (DaemonSet pattern).
  gcsFuse:
    # -- Enable GCS Fuse-backed artifact store
    enabled: false
    # -- GCS bucket name
    bucketName: ""
    # -- Restrict mount to a subdirectory within the bucket.
    # Example: "concourse/artifacts" mounts only that prefix.
    onlyDir: ""
    # -- Additional mount options passed to the GCS Fuse driver.
    # "implicit-dirs" is recommended for Concourse's tar-based artifact layout.
    mountOptions:
      - implicit-dirs

# -- PostgreSQL configuration
postgresql:
  # -- Deploy a PostgreSQL pod as part of this chart.
  # Set to false to use an external database.
  enabled: true

  # -- PostgreSQL image (only used when postgresql.enabled=true)
  image: postgres:16

  # -- Database name
  database: concourse
  # -- Database user
  user: concourse
  # -- Database password (plaintext; use existingSecret for production)
  password: concourse

  # -- Use an existing K8s Secret for the database password.
  # The Secret must contain a key matching passwordSecretKey.
  # When set, postgresql.password is ignored.
  existingSecret: ""
  # -- Key within the existing Secret that contains the password
  passwordSecretKey: postgresql-password

  # -- External database host (required when postgresql.enabled=false)
  host: ""
  # -- External database port
  port: 5432
  # -- Path to UNIX domain socket (alternative to host/port)
  socket: ""

  # -- SSL mode: disable, require, verify-ca, verify-full
  sslmode: disable
  # -- CA certificate for SSL connections.
  # Provide as a file path inside the pod (mount via web.extraVolumes).
  caCert: ""
  # -- Client certificate for mTLS connections
  clientCert: ""
  # -- Client key for mTLS connections
  clientKey: ""
  # -- Connection timeout (Go duration, e.g. "5m"). Empty = binary default (5m).
  connectTimeout: ""

  # -- Pod-level security context for the PostgreSQL pod
  podSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999

  # -- Container-level security context for the PostgreSQL container
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  # -- Resource requests and limits (only used when postgresql.enabled=true)
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # -- Persistence for database data (only used when postgresql.enabled=true)
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""

# -- Service configuration
service:
  # -- Service type: ClusterIP, LoadBalancer, NodePort
  type: LoadBalancer
  # -- HTTP port
  httpPort: 8080
  # -- TSA port (for fly CLI worker registration — unused in JetBridge but kept for compatibility)
  tsaPort: 2222
  # -- Annotations to add to the service (e.g. cloud provider LB annotations)
  annotations: {}
  # -- Extra labels to add to the service
  labels: {}
  # -- Static IP for LoadBalancer-type services
  loadBalancerIP: ""
  # -- Restrict LoadBalancer traffic to these CIDRs
  loadBalancerSourceRanges: []

# -- Ingress configuration
ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hostname
  host: ""
  # -- TLS configuration
  tls: []

# -- RBAC configuration
rbac:
  # -- Create RBAC resources (Role, RoleBinding) for the web pod
  create: true

# -- ServiceAccount configuration
serviceAccount:
  # -- Create a ServiceAccount for the web pod
  create: true
  # -- Annotations to add to the ServiceAccount
  annotations: {}

# -- OpenTelemetry tracing configuration.
# When enabled, the web node emits traces and metrics via OTLP.
# Example for Grafana Tempo: otlpAddress: "tempo.monitoring.svc:4317"
tracing:
  # -- OTLP gRPC endpoint for traces (e.g., "tempo.monitoring.svc:4317")
  otlpAddress: ""
  # -- Additional OTLP headers (map of key:value)
  otlpHeaders: {}
  # -- Use TLS for the OTLP connection
  otlpUseTLS: false
  # -- Service name reported in traces (default: concourse-web)
  serviceName: ""

# -- OpenTelemetry metrics configuration.
# When enabled, the web node exports metrics via OTLP gRPC.
otelMetrics:
  # -- OTLP gRPC endpoint for metrics (e.g., "tempo.monitoring.svc:4317")
  otlpAddress: ""
  # -- Additional OTLP headers for metrics
  otlpHeaders: {}
  # -- Use TLS for the metrics OTLP connection
  otlpUseTLS: false

# -- Secrets configuration
secrets:
  # -- Auto-generate signing keys on install.
  # Set to false and provide signingKeySecret for multi-replica deployments.
  # Each replica MUST share the same signing keys — otherwise sessions will
  # fail when requests hit a different replica.
  create: true

  # -- Name of a pre-existing Secret containing signing keys.
  # Required when secrets.create is false. The Secret must contain:
  #   session_signing_key, tsa_host_key, worker_key, authorized_worker_keys
  signingKeySecret: ""

# -- Network policy configuration
networkPolicy:
  # -- Enable NetworkPolicy resources
  enabled: false

  # -- Allow ingress from these pod selectors to the web pod.
  # Default allows all ingress when empty (only port restriction applies).
  ingressFrom: []
  # Example: restrict to ingress controller only:
  #   - podSelector:
  #       matchLabels:
  #         app.kubernetes.io/name: ingress-nginx

  # -- Additional egress rules for task pods.
  # By default, task pods can reach any destination.
  # Set to restrict outbound traffic from CI task pods.
  taskEgressTo: []
  # Example: allow only internal network:
  #   - ipBlock:
  #       cidr: 10.0.0.0/8

# -- Pod Disruption Budget configuration
pdb:
  # -- Enable PDB (only useful when web.replicas > 1)
  enabled: false
  # -- Minimum number of web pods that must be available during disruption
  minAvailable: 1

# -- Prometheus ServiceMonitor configuration (requires prometheus-operator CRDs)
serviceMonitor:
  # -- Enable ServiceMonitor creation
  enabled: false
  # -- Scrape interval
  interval: 30s
  # -- Additional labels for ServiceMonitor (e.g. for Prometheus discovery)
  labels: {}
  # -- Namespace for the ServiceMonitor (defaults to release namespace)
  namespace: ""

# -- Prometheus alerting rules (requires prometheus-operator CRDs)
alertingRules:
  # -- Enable PrometheusRule creation
  enabled: false
  # -- Additional labels for PrometheusRule
  labels: {}
