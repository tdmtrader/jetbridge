resources:
- name: repo
  type: git
  source:
    uri: https://github.com/tdmtrader/jetbridge.git
    branch: jetbridge

- name: upgrade-settle-timer
  type: time
  source:
    interval: 90s

jobs:
- name: build-and-vet
  serial_groups: [pipeline]
  plan:
  - get: repo
    trigger: true
    params: {depth: 1}
  - task: build-and-vet
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v5
      inputs:
      - name: repo
      run:
        path: sh
        args:
        - -exc
        - |
          cd repo
          echo "=== Verifying full build ==="
          go build ./cmd/concourse
          go build ./cmd/artifact-daemon
          echo "=== Build successful ==="
          echo ""
          echo "=== Running go vet ==="
          go vet ./atc/worker/jetbridge/... ./vars/... ./tracing/... \
                 ./fly/commands/... ./fly/rc/... ./fly/eventstream/... \
                 ./atc/engine/... ./atc/resource/... \
                 ./atc/scheduler/... ./atc/metric/... ./atc/creds/... \
                 ./skymarshal/token/... ./skymarshal/skyserver/...
          echo "=== Vet passed ==="

- name: unit-tests
  serial_groups: [pipeline]
  plan:
  - get: repo
    trigger: true
    params: {depth: 1}
    passed: [build-and-vet]
  - task: unit-tests
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v5
      inputs:
      - name: repo
      run:
        path: sh
        args:
        - -exc
        - |
          cd repo
          echo "=== Running unit tests across the full codebase ==="
          echo "Excluding packages that require external infrastructure"
          echo ""
          PACKAGES=$(go list ./... \
            | grep -v /integration \
            | grep -v /testflight \
            | grep -v /topgun \
            | grep -v /fly/integration \
            | grep -v /atc/db \
            | grep -v /atc/gc \
            | grep -v /atc/postgresrunner \
            | grep -v /atc/scheduler/algorithm \
            | grep -v '/atc/worker$' \
            | grep -v /skymarshal/dexserver \
            | grep -v /cmd)
          echo "Testing packages:"
          echo "$PACKAGES" | head -20
          echo "... ($(echo "$PACKAGES" | wc -l | tr -d ' ') packages total)"
          echo ""
          go test -count=1 -timeout 10m $PACKAGES
          echo "=== All unit tests passed ==="

- name: k8s-runtime-tests
  serial: true
  serial_groups: [pipeline]
  plan:
  - get: repo
    trigger: true
    params: {depth: 1}
    passed: [unit-tests]
  - task: k8s-runtime-integration-tests
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v5
      inputs:
      - name: repo
      run:
        path: sh
        args:
        - -exc
        - |
          cd repo
          echo "=== Running jetbridge full test suite ==="
          go test -v -count=1 -timeout 5m ./atc/worker/jetbridge/...
          echo "=== All jetbridge tests passed ==="

- name: tag-rc
  serial_groups: [pipeline]
  plan:
  - get: repo
    trigger: true
    params: {depth: 0, fetch_tags: true}
    passed: [k8s-runtime-tests]
  - task: create-rc-tag
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v5
      inputs:
      - name: repo
      params:
        GITHUB_TOKEN: ((github-token))
      run:
        path: sh
        args:
        - -exc
        - |
          cd repo
          git fetch --tags origin

          echo "=== Computing next version from tags ==="
          LATEST_TAG=$(git tag -l 'v0.2.*' --sort=-v:refname | grep -v '\-rc' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No release tags found, starting at v0.1.0"
            NEXT_VERSION="0.1.0"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Latest release: ${LATEST_TAG} -> next: v${NEXT_VERSION}"
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          RC_TAG="v${NEXT_VERSION}-rc"
          echo "=== Tagging ${RC_TAG} at ${SHORT_SHA} ==="

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/tdmtrader/jetbridge.git"
          git tag -f "${RC_TAG}"
          git push -f origin "${RC_TAG}"
          echo "=== Release candidate tagged: ${RC_TAG} (${SHORT_SHA}) ==="

- name: build-image
  serial_groups: [pipeline]
  plan:
  - get: repo
    trigger: true
    params: {depth: 0, fetch_tags: true}
    passed: [tag-rc]
  - task: build-and-push-local
    privileged: true
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v5
      inputs:
      - name: repo
      run:
        path: sh
        args:
        - -exc
        - |
          cd repo
          git fetch --tags origin

          echo "=== Computing version from tags ==="
          LATEST_TAG=$(git tag -l 'v0.2.*' --sort=-v:refname | grep -v '\-rc' | head -1)
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "Version: ${NEXT_VERSION}-rc (${SHORT_SHA})"

          LDFLAGS="-s -w -X github.com/concourse/concourse.Version=${NEXT_VERSION}-rc -X github.com/concourse/concourse.JetBridgeVersion=${NEXT_VERSION}-rc"

          echo "=== Building concourse binary (linux/amd64 only — fly cross-compiles deferred to release) ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o concourse-linux-amd64 ./cmd/concourse
          ls -lh concourse-linux-amd64
          echo "=== Building artifact-daemon binary ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o artifact-daemon-linux-amd64 ./cmd/artifact-daemon
          ls -lh artifact-daemon-linux-amd64

          echo "=== Building fly CLI (linux/amd64 only for local deploy) ==="
          FLY_LDFLAGS="-s -w -X github.com/concourse/concourse.Version=${NEXT_VERSION}-rc"
          mkdir -p fly-assets
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${FLY_LDFLAGS}" -o /tmp/fly ./fly
          tar czf fly-assets/fly-linux-amd64.tgz -C /tmp fly
          rm -f /tmp/fly
          ls -lh fly-assets/

          REGISTRY="registry-docker-registry.cicd.svc.cluster.local:5000"
          BUILDER_POD="image-builder-$$"

          cleanup_builder() { kubectl delete pod -n cicd ${BUILDER_POD} --grace-period=0 --force 2>/dev/null || true; }
          trap cleanup_builder EXIT
          kubectl delete pod -n cicd -l app=image-builder --grace-period=0 --force 2>/dev/null || true

          echo "=== Creating DinD builder pod ==="
          cat <<PODEOF | kubectl apply -n cicd -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: ${BUILDER_POD}
            namespace: cicd
            labels:
              app: image-builder
          spec:
            containers:
            - name: dind
              image: docker:dind
              securityContext:
                privileged: true
              env:
              - name: DOCKER_TLS_CERTDIR
                value: ""
              command: ["dockerd", "--host=unix:///var/run/docker.sock", "--insecure-registry=${REGISTRY}", "--insecure-registry=registry.home"]
          PODEOF

          echo "Waiting for builder pod to be ready..."
          kubectl wait --for=condition=ready pod/${BUILDER_POD} -n cicd --timeout=120s

          echo "Waiting for Docker daemon..."
          for i in $(seq 1 30); do
            if kubectl exec -n cicd ${BUILDER_POD} -- docker info >/dev/null 2>&1; then
              echo "Docker daemon ready"
              break
            fi
            sleep 2
          done

          echo "=== Copying binaries to builder pod ==="
          kubectl cp concourse-linux-amd64 cicd/${BUILDER_POD}:/tmp/concourse-linux-amd64
          kubectl cp artifact-daemon-linux-amd64 cicd/${BUILDER_POD}:/tmp/artifact-daemon-linux-amd64
          kubectl cp fly-assets cicd/${BUILDER_POD}:/tmp/fly-assets

          echo "=== Copying Dockerfile to builder pod ==="
          cat <<'DOCKERFILE' > /tmp/Dockerfile
          FROM ubuntu:22.04
          RUN apt-get update && \
              apt-get install -y ca-certificates dumb-init && \
              rm -rf /var/lib/apt/lists/*
          COPY concourse-linux-amd64 /usr/local/concourse/bin/concourse
          COPY artifact-daemon-linux-amd64 /usr/local/concourse/bin/artifact-daemon
          COPY fly-assets /usr/local/concourse/fly-assets
          RUN chmod +x /usr/local/concourse/bin/concourse /usr/local/concourse/bin/artifact-daemon
          ENV PATH="/usr/local/concourse/bin:${PATH}"
          ENTRYPOINT ["dumb-init", "concourse"]
          DOCKERFILE
          kubectl cp /tmp/Dockerfile cicd/${BUILDER_POD}:/tmp/Dockerfile

          echo "=== Building Docker image ==="
          kubectl exec -n cicd ${BUILDER_POD} -- \
            docker build \
              -t registry.home/jetbridge:latest \
              -t registry.home/jetbridge:v${NEXT_VERSION}-rc \
              -t ${REGISTRY}/jetbridge:latest \
              -t ${REGISTRY}/jetbridge:v${NEXT_VERSION}-rc \
              -f /tmp/Dockerfile /tmp/

          echo "=== Pushing to local registries ==="
          kubectl exec -n cicd ${BUILDER_POD} -- docker push registry.home/jetbridge:latest
          kubectl exec -n cicd ${BUILDER_POD} -- docker push registry.home/jetbridge:v${NEXT_VERSION}-rc
          kubectl exec -n cicd ${BUILDER_POD} -- docker push ${REGISTRY}/jetbridge:latest
          kubectl exec -n cicd ${BUILDER_POD} -- docker push ${REGISTRY}/jetbridge:v${NEXT_VERSION}-rc

          echo "=== Image built and pushed to local registries: v${NEXT_VERSION}-rc (${SHORT_SHA}) ==="

- name: self-upgrade
  serial_groups: [pipeline]
  plan:
  - get: repo
    trigger: true
    params: {depth: 0, fetch_tags: true}
    passed: [build-image]
  - task: trigger-rollout
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v5
      inputs:
      - name: repo
      run:
        path: sh
        args:
        - -exc
        - |
          cd repo
          git fetch --tags origin

          LATEST_TAG=$(git tag -l 'v0.2.*' --sort=-v:refname | grep -v '\-rc' | head -1)
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          IMAGE="registry.home/jetbridge:v${NEXT_VERSION}-rc"
          echo "=== Self-upgrade: deploying ${IMAGE} ==="
          echo "Triggering rollout and exiting immediately."
          echo ""

          kubectl set image deployment/concourse-web concourse-web=${IMAGE} -n cicd
          kubectl rollout restart deployment/concourse-web -n cicd
          kubectl rollout restart daemonset/artifact-daemon -n cicd

          echo "=== Rollout triggered. ==="

- name: verify-upgrade
  serial_groups: [pipeline]
  plan:
  - get: repo
    trigger: true
    params: {depth: 0, fetch_tags: true}
    passed: [self-upgrade]
  - get: upgrade-settle-timer
    trigger: false
  - task: check-running-version
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v5
      inputs:
      - name: repo
      run:
        path: sh
        args:
        - -exc
        - |
          cd repo
          git fetch --tags origin

          LATEST_TAG=$(git tag -l 'v0.2.*' --sort=-v:refname | grep -v '\-rc' | head -1)
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          EXPECTED="${MAJOR}.${MINOR}.$((PATCH + 1))-rc"

          echo "=== Waiting for rollout to complete ==="
          kubectl rollout status deployment/concourse-web -n cicd --timeout=120s || true
          kubectl rollout status daemonset/artifact-daemon -n cicd --timeout=120s || true
          echo ""

          CONCOURSE_URL="http://concourse-web.cicd.svc.cluster.local:8080"
          echo "=== Waiting for Concourse to report version ${EXPECTED} ==="
          echo ""

          for i in $(seq 1 60); do
            RUNNING=$(curl -sf "${CONCOURSE_URL}/api/v1/info" 2>/dev/null \
              | grep -o '"version":"[^"]*"' \
              | cut -d'"' -f4) || RUNNING="(unreachable)"
            echo "  attempt ${i}: running=${RUNNING} expected=${EXPECTED}"
            if [ "$RUNNING" = "$EXPECTED" ]; then
              echo ""
              echo "=== Verified: Concourse is running v${EXPECTED} ==="
              exit 0
            fi
            sleep 5
          done

          echo ""
          echo "=== FAILED: Concourse did not reach v${EXPECTED} within 5 minutes ==="
          echo "  Last seen version: ${RUNNING}"
          exit 1

- name: k8s-live-tests
  serial: true
  serial_groups: [pipeline]
  plan:
  - get: repo
    trigger: true
    params: {depth: 1}
    passed: [verify-upgrade]
  - task: k8s-live-integration-tests
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v5
      inputs:
      - name: repo
      run:
        path: sh
        args:
        - -exc
        - |
          echo "=== Setting up kubeconfig for Go test client ==="
          SA_DIR=/var/run/secrets/kubernetes.io/serviceaccount
          SA_TOKEN=$(cat "$SA_DIR/token")
          kubectl config set-cluster local --server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}" --certificate-authority="$SA_DIR/ca.crt" --embed-certs=true
          kubectl config set-credentials local --token="$SA_TOKEN"
          kubectl config set-context local --cluster=local --user=local --namespace=concourse
          kubectl config use-context local
          echo "Kubeconfig created, testing: $(kubectl get pods -n concourse --no-headers 2>&1 | wc -l) pods visible"

          export K8S_TEST_NAMESPACE=concourse
          echo "K8S_TEST_NAMESPACE=$K8S_TEST_NAMESPACE"

          echo "=== Cleaning up stale test pods from previous runs ==="
          for NS in concourse concourse-test; do
            kubectl get pods -n $NS --no-headers -o custom-columns=":metadata.name" 2>/dev/null \
              | { grep -E '^(live-|e2e-)' || true; } \
              | xargs -r kubectl delete pods -n $NS --grace-period=0 --force 2>/dev/null || true
          done
          echo ""

          export ARTIFACT_DAEMON_HOST_PATH=/var/concourse/artifacts
          export ARTIFACT_DAEMON_PORT=7780
          export ARTIFACT_DAEMON_SERVICE=artifact-daemon

          cd repo
          echo "=== Running jetbridge live integration tests ==="
          echo "These tests create real K8s pods against the live cluster."
          echo "Artifact daemon: hostPath=$ARTIFACT_DAEMON_HOST_PATH port=$ARTIFACT_DAEMON_PORT"
          echo ""
          go test -tags live -v -count=1 -timeout 5m ./atc/worker/jetbridge/...
          echo "=== Live integration tests passed ==="

- name: release
  serial_groups: [pipeline]
  plan:
  - get: repo
    trigger: true
    params: {depth: 0, fetch_tags: true}
    passed: [k8s-live-tests]
  - task: tag-push-release
    privileged: true
    config:
      platform: linux
      rootfs_uri: docker:///registry.home/concourse-test-runner:v5
      inputs:
      - name: repo
      params:
        GITHUB_TOKEN: ((github-token))
      run:
        path: sh
        args:
        - -exc
        - |
          cd repo
          git fetch --tags origin

          echo "=== Computing release version from tags ==="
          LATEST_TAG=$(git tag -l 'v0.2.*' --sort=-v:refname | grep -v '\-rc' | head -1)
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          SHORT_SHA=$(git rev-parse --short HEAD)

          echo "Releasing: v${NEXT_VERSION} (${SHORT_SHA})"

          git config --global user.email "ci@concourse.home"
          git config --global user.name "Concourse CI"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/tdmtrader/jetbridge.git"

          # --- 1. Create annotated release tag ---
          echo "=== Tagging v${NEXT_VERSION} ==="
          if git rev-parse "v${NEXT_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${NEXT_VERSION} already exists — skipping"
          else
            git tag -a "v${NEXT_VERSION}" -m "Release v${NEXT_VERSION}"
            git push origin "v${NEXT_VERSION}"
            echo "=== Tagged v${NEXT_VERSION} ==="
          fi

          # --- 2. Push to main ---
          echo "=== Pushing to main ==="
          git push --force origin HEAD:refs/heads/main
          echo "=== Pushed ${SHORT_SHA} to main ==="

          # --- 3. Build multi-platform fly + push to GHCR ---
          REGISTRY="registry-docker-registry.cicd.svc.cluster.local:5000"
          GHCR="ghcr.io/tdmtrader/jetbridge"
          BUILDER_POD="release-push-$$"

          cleanup_builder() { kubectl delete pod -n cicd ${BUILDER_POD} --grace-period=0 --force 2>/dev/null || true; }
          trap cleanup_builder EXIT
          kubectl delete pod -n cicd -l app=release-push --grace-period=0 --force 2>/dev/null || true

          echo "=== Creating DinD pod for GHCR push ==="
          cat <<PODEOF | kubectl apply -n cicd -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: ${BUILDER_POD}
            namespace: cicd
            labels:
              app: release-push
          spec:
            containers:
            - name: dind
              image: docker:dind
              securityContext:
                privileged: true
              env:
              - name: DOCKER_TLS_CERTDIR
                value: ""
              command: ["dockerd", "--host=unix:///var/run/docker.sock", "--insecure-registry=${REGISTRY}", "--insecure-registry=registry.home"]
          PODEOF

          echo "Waiting for push pod to be ready..."
          kubectl wait --for=condition=ready pod/${BUILDER_POD} -n cicd --timeout=120s
          for i in $(seq 1 30); do
            if kubectl exec -n cicd ${BUILDER_POD} -- docker info >/dev/null 2>&1; then break; fi
            sleep 2
          done

          echo "=== Building fly CLI for all platforms ==="
          LDFLAGS="-s -w -X github.com/concourse/concourse.Version=${NEXT_VERSION} -X github.com/concourse/concourse.JetBridgeVersion=${NEXT_VERSION}"
          FLY_LDFLAGS="-s -w -X github.com/concourse/concourse.Version=${NEXT_VERSION}"
          mkdir -p fly-assets fly-bin
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            OS="${pair%%/*}"
            ARCH="${pair##*/}"
            echo "  fly-${OS}-${ARCH}"
            CGO_ENABLED=0 GOOS=${OS} GOARCH=${ARCH} go build -ldflags "${FLY_LDFLAGS}" -o fly-bin/fly ./fly
            tar czf fly-assets/fly-${OS}-${ARCH}.tgz -C fly-bin fly
            rm -f fly-bin/fly
          done
          rm -rf fly-bin
          ls -lh fly-assets/

          echo "=== Pulling RC image, adding fly assets, retagging as release ==="
          kubectl exec -n cicd ${BUILDER_POD} -- docker pull registry.home/jetbridge:v${NEXT_VERSION}-rc

          echo "=== Copying fly assets into builder pod ==="
          kubectl cp fly-assets cicd/${BUILDER_POD}:/tmp/fly-assets

          echo "=== Rebuilding image with all fly platform assets ==="
          cat <<'DOCKERFILE' > /tmp/Dockerfile.release
          FROM registry.home/jetbridge:v__VERSION__-rc
          COPY fly-assets /usr/local/concourse/fly-assets
          DOCKERFILE
          sed -i "s/__VERSION__/${NEXT_VERSION}/g" /tmp/Dockerfile.release
          kubectl cp /tmp/Dockerfile.release cicd/${BUILDER_POD}:/tmp/Dockerfile.release
          kubectl exec -n cicd ${BUILDER_POD} -- \
            docker build \
              -t registry.home/jetbridge:v${NEXT_VERSION} \
              -t ${GHCR}:${SHORT_SHA} \
              -t ${GHCR}:v${NEXT_VERSION} \
              -t ${GHCR}:latest \
              -f /tmp/Dockerfile.release /tmp/

          echo "=== Pushing release to local registry ==="
          kubectl exec -n cicd ${BUILDER_POD} -- docker push registry.home/jetbridge:v${NEXT_VERSION}

          echo "=== Logging into GHCR ==="
          echo "${GITHUB_TOKEN}" | kubectl exec -i -n cicd ${BUILDER_POD} -- docker login ghcr.io -u tdmtrader --password-stdin

          echo "=== Pushing to GHCR ==="
          kubectl exec -n cicd ${BUILDER_POD} -- docker push ${GHCR}:${SHORT_SHA}
          kubectl exec -n cicd ${BUILDER_POD} -- docker push ${GHCR}:v${NEXT_VERSION}
          kubectl exec -n cicd ${BUILDER_POD} -- docker push ${GHCR}:latest

          # --- 4. Redeploy with final release version (includes all fly assets) ---
          echo "=== Redeploying with release image ==="
          IMAGE="registry.home/jetbridge:v${NEXT_VERSION}"
          kubectl set image deployment/concourse-web concourse-web=${IMAGE} -n cicd
          kubectl rollout restart deployment/concourse-web -n cicd

          # Clean up the RC tag
          git push origin --delete "v${NEXT_VERSION}-rc" 2>/dev/null || true

          echo "=== Release complete: v${NEXT_VERSION} (${SHORT_SHA}) ==="
          echo "  Tagged: v${NEXT_VERSION}"
          echo "  Main:   pushed"
          echo "  GHCR:   ${GHCR}:v${NEXT_VERSION}"
          echo "  Local:  ${IMAGE}"
