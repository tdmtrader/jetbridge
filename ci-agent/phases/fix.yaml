name: fix
env:
  repo_dir:
    var: REPO_DIR
    default: repo
  review_dir:
    var: REVIEW_DIR
    default: review
  output_dir:
    var: OUTPUT_DIR
    default: fix-report
  test_cmd:
    var: TEST_CMD
    default: "go test ./..."
  branch_name:
    var: BRANCH_NAME
    default: ""
mcp:
  - git
  - test
  - filesystem
steps:
  - name: fix-issues
    template: prompts/fix/apply.md
    output_schema: schemas/fix_output.json
    verify_cmd: "${TEST_CMD:-go test ./...}"
    artifacts:
      - name: fix-report
        path: fix-report.json
        media_type: application/json
